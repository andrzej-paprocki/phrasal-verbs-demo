<body>

    <div class="wrapper">

        <div class="podheader">
            <p class="class12" id="x">Unit 145 theory &nbsp; &nbsp; Phrasal verbs 9  &nbsp; &nbsp; <b>away</b> / <b>back</b> </p>
        </div>

        <!-- теги для хедера -->
        <script type="text/javascript" src="js/header_theory.js"></script>      

        <!-- подключение функций для навигации (теория/упражнения, предыдущий/следующий...) -->
        <script type="text/javascript" src="js/navigation_theory.js"></script>


        <!-- Если открыт файл теории, то слово "theory" должно быть жирным. 
            Если открыт файл упражнений – то жирным должно быть слово "exercises" -->
            <script src="js/theoryorexercises.js"></script>


            <br/><br/><br/>

            <div class="container">    

                <script> writeParagraph("Compare <b>away</b> and <b>back</b>:"); </script> 
                <!--section A    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>away</b> = away from home");
                        writeTagsCheckbox("We're <b>going away</b> on holiday today."); 

                        writeParagraph("<b>back</b> = back home");
                        writeTagsCheckbox("We'll <b>be back</b> in three weeks."); 
                    </script>
                    <hr>
                    <script>
                        writeParagraph("<b>away</b> = away from a place, a person etc.");
                        writeTagsCheckbox("The woman got into her car, started the engine and <b>drove away</b>.");
                        writeTagsCheckbox("I tried to take a picture of the bird, but it <b>flew away</b>.");
                        writeTagsCheckbox("I dropped the ticket and it <b>blew away</b> in the wind.");
                        writeTagsCheckbox("The police searched the house and <b>took away</b> a computer.");

                        writeParagraph("<b>back</b> = back to a place, a person etc.");
                        writeTagsCheckbox("A: I'm going out now.<br/> B: What time will you <b>be back</b>?"); 
                        writeTagsCheckbox("After eating at a restaurant, we <b>walked back</b> to our hotel.");
                        writeTagsCheckbox("I've still got Jane's keys. I forgot to <b>give</b> them <b>back</b> to her.");
                        writeTagsCheckbox("When you've finished with that book, can you <b>put</b> it <b>back</b> on the shelf?");
                    </script>
                    <hr>
                    <script>
                    	writeParagraph("In the same way you can say:<br/><b>walk away</b>, <b>run away</b>, <b>look away</b> etc.");

                        writeParagraph("In the same way you can say:<br/> <b>go back</b>, <b>come back</b>, <b>get back</b>, <b>take</b> something <b>back</b> etc.");
                    </script>
                </div>

                <script> writeParagraph("Other verbs <b>+ away</b>"); </script>
                <!--section B    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>get away</b> = <i>escape, leave with difficulty</i>"); 
                        writeTagsCheckbox("We tried to catch the thief, but she managed to <b>get away</b>."); 

                        writeParagraph("<b>get away with</b> something = <i>do something wrong without being caught</i>");
                        writeTagsCheckbox("I parked in a no-parking zone, but I <b>got away with</b> it. I didn't have to pay a fine."); 

                        writeParagraph("<b>keep away (from ...)</b> = <i>don't go near</i>");
                        writeTagsCheckbox("<b>Keep away from</b> the edge of the pool. You might fall in."); 

                        writeParagraph("<b>give</b> something <b>away</b> = <i>give it to somebody else because you don't want it any more</i>");
                        writeTagsCheckbox("&mdash;Did you sell your old computer?<br/> &mdash;No, I <b>gave</b> it <b>away</b>.");

                        writeParagraph("<b>put</b> something <b>away</b> = <i>put it in the place where it is kept, usually out of sight</i>");
                        writeTagsCheckbox("When the children had finished playing with their toys, they <b>put</b> them <b>away</b>.");

                        writeParagraph("<b>throw</b> something <b>away</b> = <i>put it in the rubbish</i>");
                        writeTagsCheckbox("I kept the letter, but I <b>threw away</b> the envelope.");
                    </script> 
                </div>

                <script> writeParagraph("Other verbs <b>+ back</b>"); </script>
                <!--section C    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>wave back</b> / <b>smile back</b> / <b>shout back</b> / <b>write back</b> / <b>hit</b> somebody <b>back</b>");
                        writeTagsCheckbox("I waved to her and she <b>waved back</b>."); 

                        writeParagraph("<b>call</b>/<b>phone</b>/<b>ring</b> (somebody) <b>back</b> = <i>return a phone call</i>");
                        writeTagsCheckbox("I can't talk to you now. I'll <b>call</b> you <b>back</b> in ten minutes."); 

                        writeParagraph("<b>get back to</b> somebody = <i>reply to them by phone etc.</i>");
                        writeTagsCheckbox("I sent him an email, but he never <b>got back to</b> me.");

                        writeParagraph("<b>look back</b> (<b>on</b> something) = <i>think about what happened in the past</i>");
                        writeTagsCheckbox("My first job was in a travel agency. I didn't like it very much at the time but, <b>looking back on</b> it, I learnt a lot and it was a very useful experience.");

                        writeParagraph("<b>pay back</b> money, <b>pay</b> somebody <b>back</b>");
                        writeTagsCheckbox("If you borrow money, you have to <b>pay</b> it <b>back</b>.");
                        writeTagsCheckbox("Thanks for lending me the money. I'll <b>pay</b> you <b>back</b> next week.");
                    </script> 
                </div>

                <p class="linkbottom">Phrasal verbs 1 (General points) &nbsp;<img src="img/arrow_linkbottom.svg">&nbsp; Unit 137</p>
            </div>
