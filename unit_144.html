        <!-- Если открыт файл теории, то слово "theory" должно быть жирным. 
            Если открыт файл упражнений – то жирным должно быть слово "exercises" -->

            <br/><br/><br/>

            <div class="container">    

                <!-- <script> writeParagraph("xxx"); </script> --> 
                <!--section A    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>bring up</b> a topic etc. = <i>introduce it in a conversation</i>");
                        writeTagsCheckbox("I don't want to hear any more about this matter. Please don't <b>bring</b> it <b>up</b> again.");  

                        writeParagraph("<b>come up</b> = <i>be introduced in a conversation</i>");
                        writeTagsCheckbox("Some interesting points <b>came up</b> in our discussion yesterday."); 

                        writeParagraph("<b>come up with</b> an idea, a suggestion etc. = <i>produce an idea</i>");
                        writeTagsCheckbox("Sarah is very creative. She's always <b>coming up with</b> new ideas."); 

                        writeParagraph("<b>make</b> something <b>up</b> = <i>invent something that is not true</i>");
                        writeTagsCheckbox("What Kevin told you about himself wasn't true. He <b>made</b> it all <b>up</b>.");                                        
                    </script>
                </div>

                <!-- <script> writeParagraph("xxx"); </script> -->
                <!--section B    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>cheer up</b> = <i>be happier</i>, <b>cheer</b> somebody <b>up</b> = <i>make somebody feel happier</i>");
                        writeTagsCheckbox("You look so sad! <b>Cheer up</b>!"); 
                        writeTagsCheckbox("Helen is depressed at the moment. What can we do to <b>cheer</b> her <b>up</b>?");

                        writeParagraph("<b>save up</b> for something / to do something = <i>save money to buy something</i>");
                        writeTagsCheckbox("Dan is <b>saving up</b> for a trip round the world."); 

                        writeParagraph("<b>clear up</b> = <i>become bright (for weather)</i>");
                        writeTagsCheckbox("It was raining when I got up, but it <b>cleared up</b> later.");                                                
                    </script> 
                </div>

                <!-- <script> writeParagraph("xxx"); </script> -->
                <!--section C    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>blow up</b> = <i>explode</i>, <b>blow</b> something <b>up</b> = <i>destroy it with a bomb etc.</i>");
                        writeTagsCheckbox("The engine caught fire and <b>blew up</b>."); 
                        writeTagsCheckbox("The bridge was <b>blown up</b> during the war.");

                        writeParagraph("<b>tear</b> something <b>up</b> = <i>tear it into pieces</i>");
                        writeTagsCheckbox("I didn't read the letter. I just <b>tore</b> it <b>up</b> and threw it away."); 

                        writeParagraph("<b>beat</b> somebody <b>up</b> = <i>hit someone repeatedly so that they are badly hurt</i>");
                        writeTagsCheckbox("A friend of mine was attacked and <b>beaten up</b> a few days ago. He was badly hurt and had to go to hospital.");                      
                    </script> 
                </div>

                <!-- <script> writeParagraph("xxx"); </script> -->
                <!--section D    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>break up</b> / <b>split up</b> (with somebody) = <i>separate</i>");
                        writeTagsCheckbox("I'm surprised to hear that Sue and Paul have <b>split up</b>. They seemed very happy together."); 

                        writeParagraph("<b>do up</b> a coat, a shoelace, buttons etc. = <i>fasten, tie etc.</i>");
                        writeTagsCheckbox("It's quite cold. <b>Do up</b> your coat before you go out."); 

                        writeParagraph("<b>do up</b> a building, a room etc. = <i>repair and improve it</i>");
                        writeTagsCheckbox("The kitchen looks great now that it has been <b>done up</b>."); 

                        writeParagraph("<b>look</b> something <b>up</b> in a dictionary, encyclopaedia etc.");
                        writeTagsCheckbox("If you don't know the meaning of a word, you can <b>look</b> it <b>up</b> in a dictionary."); 

                        writeParagraph("<b>put up with</b> something = <i>tolerate it</i>");
                        writeTagsCheckbox("We live on a busy road, so we have to <b>put up with</b> a lot of noise from the traffic."); 

                        writeParagraph("<b>hold up</b> a person, a plan etc. = <i>delay</i>");
                        writeTagsCheckbox("Don't wait for me. I don't want to <b>hold</b> you <b>up</b>.");
                        writeTagsCheckbox("Plans to build a new factory have been <b>held up</b> because of the company's financial problems.");

                        writeParagraph("<b>mix up</b> people/things, <b>get</b> people/things <b>mixed up</b> = <i>you think one is the other</i>");
                        writeTagsCheckbox("The two brothers Look very similar. Many people <b>mix</b> them <b>up</b>. (or ... <b>get</b> them <b>mixed up</b>)");
                    </script> 
                </div>
