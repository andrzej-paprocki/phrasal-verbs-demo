    <div class="wrapper">

        <div class="podheader">
            <p class="class12" id="x">Unit 140 theory &nbsp; &nbsp; Phrasal verbs 4  &nbsp; &nbsp; <b>on</b> / <b>off</b> (1) </p>
        </div>

        <!-- теги для хедера -->
        <script type="text/javascript" src="js/header_theory.js"></script>      

        <!-- подключение функций для навигации (теория/упражнения, предыдущий/следующий...) -->
        <script type="text/javascript" src="js/navigation_theory.js"></script>

        <!-- Если открыт файл теории, то слово "theory" должно быть жирным. Если открыт файл упражнений – то жирным должно быть слово "exercises" -->
        <script src="js/theoryorexercises.js"></script>

        <br/><br/><br/>

        <div class="container">    

            <script> writeParagraph("<b>On</b> and <b>off</b> for lights, machines etc."); </script> 
            <!--section A    -->
            <div class="section">
                <script>
                    writeParagraph("We say:" + "<ol>the light <b>is on</b> / <b>put</b> the light <b>on</b> / <b>leave</b> the light <b>on</b> etc. </br><b>turn</b> the light <b>on</b>/<b>off</b> &nbsp; <i>or</i> &nbsp; <b>switch</b> the light <b>on</b>/<b>off</b></ol>");
                    writeTagsCheckbox("Shall I <b>leave</b> the lights <b>on</b> or <b>turn</b> them <b>off?</b>"); 
                    writeTagsCheckbox("'<b>Is</b> the heating <b>on</b>?' ‘No, I <b>switched</b> it <b>off</b>.'"); 
                    writeTagsCheckbox("We need some boiling water, so I'll <b>put</b> the kettle <b>on</b>.");

                    writeParagraph("<i>Also</i> <b>put on</b> some music / a CD etc.");
                    writeTagsCheckbox("I haven't listened to this CD yet. Shall I <b>put</b> it <b>on</b>? (= shall I play it)");
                </script> 
            </div>

            <script> writeParagraph("<b>On</b> and <b>off</b> for events etc."); </script>
            <!--section B    -->
            <div class="section">
                <script>
                    writeParagraph("<b>go on</b> = <i>happen</i>");
                    writeTagsCheckbox("What's all that noise? What's <b>going on</b>? (= what’s happening)");

                    writeParagraph("<b>call</b> something <b>off</b> = <i>cancel it</i>");
                    writeTagsCheckbox("The open air concert had to be <b>called off</b> because of the weather.");

                    writeParagraph("<b>put</b> something <b>off</b>, <b>put off</b> doing something = <i>delay it</i>");
                    writeTagsCheckbox("The wedding has been <b>put off</b> until January.");
                    writeTagsCheckbox("We can't <b>put off</b> making a decision. We have to decide now.");
                </script> 
            </div>

            <script> writeParagraph("<b>On</b> and <b>off</b> for clothes etc."); </script>
            <!--section C    -->
            <div class="section">
                <script>
                    writeParagraph("<b>put on</b> clothes, glasses, make-up, a seat belt etc.");
                    writeTagsCheckbox("My hands were cold, so I <b>put</b> my gloves <b>on</b>.");

                    writeParagraph("<i>Also</i> <b>put on</b> weight = <i>get heavier</i>");
                    writeTagsCheckbox("I've <b>put on</b> two kilograms in the last month.");

                    writeParagraph("<b>try on</b> clothes (to see if they fit)");
                    writeTagsCheckbox("I <b>tried on</b> a jacket in the shop, but it didn't fit me very well.");

                    writeParagraph("<b>take off</b> clothes, glasses etc.");
                    writeTagsCheckbox("It was warm, so I <b>took off</b> my jacket.");
                </script>  
            </div>

            <script> writeParagraph("<b>Off</b> = away from a person or place"); </script>
            <!--section D    -->
            <div class="section">
                <script>
                    writeParagraph("<b>be off</b> (to a place)");
                    writeTagsCheckbox("Tomorrow I'<b>m off</b> to Paris / I'<b>m off</b> on holiday.");
                </script>
                <p class="second">(= I'm going to Paris / I'm going on holiday)</p>

                <script>
                    writeParagraph("<b>walk off</b> / <b>run off</b> / <b>drive off</b> / <b>ride off</b> / <b>go off</b> (similar to walk away / run away etc.)");
                    writeTagsCheckbox("Diane got on her bike and <b>rode off</b>.");
                    writeTagsCheckbox("Mark left home at the age of 18 and <b>went off</b> to Canada.");

                    writeParagraph("<b>set off</b> = <i>start a journey</i>");
                    writeTagsCheckbox("We <b>set off</b> very early to avoid the traffic. (= We left early)");

                    writeParagraph("<b>take off</b> = <i>leave the ground (for planes)</i>");
                    writeTagsCheckbox("After a long delay the plane finally <b>took off</b>.");

                    writeParagraph("<b>see</b> somebody <b>off</b> = <i>go with them to the airport/station to say goodbye</i>");
                    writeTagsCheckbox("Helen was going away. We went to the station with her to <b>see</b> her <b>off</b>.");
                </script> 
            </div>

                <p class="linkbottom">Phrasal verbs 1 (General points) &nbsp;<img src="img/arrow_linkbottom.svg">&nbsp; Unit 137</p>
