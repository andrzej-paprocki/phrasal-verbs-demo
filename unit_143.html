            <br/><br/><br/>

            <div class="container">    

                <!-- <script> writeParagraph("xxx"); </script> --> 
                <!--section A    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>go up</b> / <b>come up</b> / <b>walk up</b> (<b>to</b> ...) = <i>approach</i>");
                        writeTagsCheckbox("A man <b>came up to</b> me in the street and asked me for money."); 

                        writeParagraph("<b>catch up</b> (<b>with</b> somebody), <b>catch</b> somebody <b>up</b> = <i>move faster than somebody in front of you so that you reach them</i>");
                        writeTagsCheckbox("I’m not ready to go yet. You go on and I'll <b>catch up with</b> you / I'll <b>catch</b> you <b>up</b>.");

                        writeParagraph("<b>keep up</b> (<b>with</b> somebody) = <i>continue at the same speed or level</i>");
                        writeTagsCheckbox("You're walking too fast. I can't <b>keep up</b> (<b>with</b> you)."); 
                        writeTagsCheckbox("You're doing well. <b>Keep</b> it <b>up</b>!");                                          
                    </script>
                </div>

                <!-- <script> writeParagraph("xxx"); </script> -->
                <!--section B    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>set up</b> an organisation, a company, a business, a system, a website etc. = <i>start it</i>"); 
                        writeTagsCheckbox("The government has <b>set up</b> a committee to investigate the problem.");  

                        writeParagraph("<b>take up</b> a hobby, a sport, an activity etc. = <i>start doing it</i>"); 
                        writeTagsCheckbox("Laura <b>took up</b> photography a few years ago. She takes really good pictures.");

                        writeParagraph("<b>fix up</b> a meeting etc. = <i>arrange it</i>"); 
                        writeTagsCheckbox("We've <b>fixed up</b> a meeting for next Monday.");                                               
                    </script> 
                </div>

                <!-- <script> writeParagraph("xxx"); </script> -->
                <!--section C    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>grow up</b> = <i>become an adult</i>");
                        writeTagsCheckbox("Ann was born in Hong Kong but <b>grew up</b> in Australia."); 

                        writeParagraph("<b>bring up</b> a child = <i>raise, look after a child</i>");
                        writeTagsCheckbox("Her parents died when she was a child and she was <b>brought up</b> by her grandparents.");                      
                    </script> 
                </div>

                <!-- <script> writeParagraph("xxx"); </script> -->
                <!--section D    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>clean up</b> / <b>clear up</b> / <b>tidy up</b> something = <i>make it clean, tidy etc.</i>");
                        writeTagsCheckbox("Look at this mess! Who's going to <b>tidy up</b>? (<i>or</i> <b>tidy</b> it <b>up</b>)"); 

                        writeParagraph("<b>wash up</b> = <i>wash the plates, dishes etc. after a meal</i>");
                        writeTagsCheckbox("I hate <b>washing up</b>. (<i>or</i> I hate <b>doing the washing-up</b>.)");
                    </script> 
                </div>

                <!-- <script> writeParagraph("xxx"); </script> -->
                <!--section E    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>end up</b> somewhere, <b>end up</b> doing something etc.");
                        writeTagsCheckbox("There was a fight in the street and three men <b>ended up</b> in hospital. (= that's what happened to these men in the end)"); 
                        writeTagsCheckbox("I couldn't find a hotel and <b>ended up</b> sleeping on a bench at the station. (= that's what happened to me in the end)");

                        writeParagraph("<b>give up</b> = <i>stop trying</i>, <b>give</b> something <b>up</b> = <i>stop doing it</i>");
                        writeTagsCheckbox("Don't <b>give up</b>. Keep trying!");
                        writeTagsCheckbox("Sue got bored with her job and decided to <b>give</b> it <b>up</b>. (= stop doing it)");

                        writeParagraph("<b>make up</b> something, be <b>made up of</b> something");
                        writeTagsCheckbox("Children under 16 <b>make up</b> half the population of the city. (= half the population are children under 16)");
                        writeTagsCheckbox("Air is <b>made up</b> mainly <b>of</b> nitrogen and oxygen. (= Air consists of&nbsp;...)");  
                        
                        writeParagraph("<b>take up</b> space or time = <i>use space or time</i>");
                        writeTagsCheckbox("Most of the space in the room was <b>taken up</b> by a large table.");

                        writeParagraph("<b>turn up</b> / <b>show up</b> = <i>arrive, appear</i>");
                        writeTagsCheckbox("We arranged to meet David last night, but he didn't <b>turn up</b>");

                        writeParagraph("<b>use</b> something <b>up</b> = <i>use all of it so that nothing is left</i>");
                        writeTagsCheckbox("I'm going to make some soup. We have a lot of vegetables and I want to <b>use</b> them <b>up</b>.");                                                                                              
                    </script> 
                </div>
