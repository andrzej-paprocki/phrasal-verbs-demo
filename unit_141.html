<body>

        <div class="podheader">
            <p class="class12" id="x">Unit 141 theory &nbsp; &nbsp; Phrasal verbs 5  &nbsp; &nbsp; <b>on</b> / <b>off</b> (2) </p>
        </div>

        <!-- теги для хедера -->
        <script type="text/javascript" src="js/header_theory.js"></script>      

        <!-- подключение функций для навигации (теория/упражнения, предыдущий/следующий...) -->
        <script type="text/javascript" src="js/navigation_theory.js"></script>

        <!-- Если открыт файл теории, то слово "theory" должно быть жирным. Если открыт файл упражнений – то жирным должно быть слово "exercises" -->
        <script src="js/theoryorexercises.js"></script>

        <br/><br/><br/>

        <div class="container">    

            <script> writeParagraph("<i>Verb</i> + <b>on</b> = continue doing something"); </script> 
            <!--section A    -->
            <div class="section">
                <script>
                    writeParagraph("<b>drive on</b> / <b>walk on</b> / <b>play on</b> = <i>continue driving / walking / playing etc.</i>");
                    writeTagsCheckbox("Shall we stop at this petrol station or shall we <b>drive on</b> to the next one?"); 

                    writeParagraph("<b>go on</b> = <i>continue</i>");
                    writeTagsCheckbox("The party <b>went on</b> until 4 o'clock in the morning.");

                    writeParagraph("<b>go on</b> / <b>carry on</b> doing something = <i>continue doing something</i>");
                    writeTagsCheckbox("We can't <b>go on</b> spending money like this. We'll have nothing left soon.");
                    writeTagsCheckbox("I don't want to <b>carry on</b> working here. I'm going to look for another job.");

                    writeParagraph("<i>Also</i> <b>go on with</b> / <b>carry on with</b> something");
                    writeTagsCheckbox("Don't let me disturb you. Please <b>carry on with</b> what you're doing.");

                    writeParagraph("<b>keep on</b> doing something = do it continuously or repeatedly");
                    writeTagsCheckbox("He <b>keeps on</b> criticising me. I'm fed up with it!");
                </script> 
            </div>

            <script> writeParagraph("<b>Get on</b>"); </script>
            <!--section B    -->
            <div class="section">
                <script>
                    writeParagraph("<b>get on</b> = <i>progress</i>");
                    writeTagsCheckbox("How are you <b>getting on</b> in your new job? (= How is it going?)");

                    writeParagraph("<b>get on</b> (<b>with</b> somebody) = <i>have a good relationship</i>");
                    writeTagsCheckbox("Joanne and Karen don't <b>get on</b>. They're always arguing.");
                    writeTagsCheckbox("Richard <b>gets on</b> well <b>with</b> his neighbours. They're all very friendly.");

                    writeParagraph("<b>get on with</b> something = <i>continue doing something you have to do, usually after an interruption</i>");
                    writeTagsCheckbox("I must <b>get on with</b> my work. I have a lot to do.");
                </script> 
            </div>

            <script> writeParagraph("<i>Verb</i> + <b>off</b>"); </script>
            <!--section C    -->
            <div class="section">
                <script>
                    writeParagraph("<b>doze off</b> / <b>drop off</b> / <b>nod off</b> = <i>fall asleep</i>");
                    writeTagsCheckbox("The lecture wasn't very interesting. In fact I <b>dozed off</b> in the middle of it."); 

                    writeParagraph("<b>finish</b> something <b>off</b> = <i>do the last part of something</i>");
                    writeTagsCheckbox("A: Have you finished painting the kitchen?");
                </script>
                <p class="second">B: Nearly. I'll <b>finish</b> it <b>off</b> tomorrow.</p>

                <script>                
                    writeParagraph("<b>go off</b> = <i>explode</i>");
                    writeTagsCheckbox("A bomb <b>went off</b> in the city centre, but fortunately nobody was hurt.");

                    writeParagraph("<i>Also</i> an alarm can <b>go off</b> = ring");
                    writeTagsCheckbox("Did you hear the alarm <b>go off</b>?"); 

                    writeParagraph("<b>put</b> somebody <b>off</b> (doing something) = <i>cause somebody not to want something or to do something</i>");
                    writeTagsCheckbox("We wanted to go to the exhibition, but we were <b>put off</b> by the long queue.");
                    writeTagsCheckbox("What <b>put</b> you <b>off</b> applying for the job? Was the salary too low?");

                    writeParagraph("<b>rip</b> somebody <b>off</b> = <i>cheat somebody (informal)</i>");
                    writeTagsCheckbox("Did you really pay £2,000 for that painting? I think you were <b>ripped off</b>."); 
                </script> 
                <p class="second">(= you paid too much)</p>

                <script>
                    writeParagraph("<b>show off</b> = <i>try to impress people with your ability, your knowledge etc.</i>");
                    writeTagsCheckbox("Look at that boy on the bike riding with no hands. He's just <b>showing off</b>.");

                    writeParagraph("<b>tell</b> somebody <b>off</b> = <i>speak angrily to somebody because they did something wrong</i>");
                    writeTagsCheckbox("Clare's mother <b>told</b> her <b>off</b> for wearing dirty shoes in the house."); 
                </script>
            </div>
