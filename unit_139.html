        <!-- теги для хедера -->
        <script type="text/javascript" src="js/header_theory.js"></script>      

        <!-- подключение функций для навигации (теория/упражнения, предыдущий/следующий...) -->

        <!-- Если открыт файл теории, то слово "theory" должно быть жирным. 
        Если открыт файл упражнений – то жирным должно быть слово "exercises" -->

        <br/><br/><br/>


        <div class="container">    

            <!-- <script> writeParagraph("<b>out</b> = <i>not burning, not shining</i>"); </script> --> 
            <!--section A    -->
            <div class="section">
                <script>
                    writeParagraph("<b>out</b> = <i>not burning, not shining</i>");
                    writeParagraph("<b>go out</b>"); 
                    writeTagsCheckbox("Suddenly all the lights in the building <b>went out</b>."); 

                    writeParagraph("<b>put out</b> a fire / a cigarette / a light"); 
                    writeTagsCheckbox("We managed to <b>put</b> the fire <b>out</b>.");

                    writeParagraph("<b>turn out</b> a light"); 
                    writeTagsCheckbox("I <b>turned</b> the lights <b>out</b> before leaving.");

                    writeParagraph("<b>blow out</b> a candle"); 
                    writeTagsCheckbox("We don't need the candle. You can <b>blow</b> it <b>out</b>.");
                </script> 
            </div>

            <script> writeParagraph("<b>work out</b>"); </script>
            <!--section B    -->
            <div class="section">
                <script>
                    writeParagraph("<b>work out</b> = <i>do physical exercises</i>");
                    writeTagsCheckbox("Rachel <b>works out</b> at the gym three times a week.");

                    writeParagraph("<b>work out</b> = <i>develop, progress</i>");
                    writeTagsCheckbox("Good luck for the future. I hope everything <b>works out</b> well for you.");
                    writeTagsCheckbox("A: Why did James leave the company? <br/> B: Things didn't <b>work out</b>. (= things didn't work out well)");

                    writeParagraph("<b>work out</b> (for mathematical calculations)");
                    writeTagsCheckbox("The total bill for three people is £84.60. That <b>works out</b> at £28.20 each.");

                    writeParagraph("<b>work</b> something <b>out</b> = <i>calculate, think about a problem and find the answer</i>");
                    writeTagsCheckbox("345 x 76? I need to do this on paper. I can't <b>work</b> it <b>out</b> in my head.");
                </script> 
            </div>

            <script> writeParagraph("Other verbs + <b>out</b>"); </script>
            <!--section C    -->
            <div class="section">
                <script>
                    writeParagraph("<b>carry out</b> an order, an experiment, a survey, an investigation, a plan etc.");
                    writeTagsCheckbox("Soldiers are expected to <b>carry out</b> orders.");
                    writeTagsCheckbox("An investigation into the accident will be <b>carried out</b> as soon as possible.");

                    writeParagraph("<b>fall out</b> (<b>with</b> somebody) = <i>stop being friends</i>");
                    writeTagsCheckbox("They used to be very good friends. I’m surprised to hear that they have <b>fallen out</b>.");
                    writeTagsCheckbox("David <b>fell out with</b> his father and left home.");

                    writeParagraph("<b>find out</b> that/what/when ... etc., <b>find out about</b> something = <i>get information</i>");
                    writeTagsCheckbox("The police never <b>found out</b> who committed the murder.");
                    writeTagsCheckbox("I just <b>found out</b> that it's Helen's birthday today.");
                    writeTagsCheckbox("I checked a few websites to <b>find out about</b> hotels in the town.");

                    writeParagraph("<b>give</b>/<b>hand</b> things <b>out</b> = <i>give to each person</i>");
                    writeTagsCheckbox("At the end of the lecture, the speaker <b>gave out</b> information sheets to the audience.");

                    writeParagraph("<b>point</b> something <b>out</b> (<b>to</b> somebody) = <i>draw attention to something</i>");
                    writeTagsCheckbox("As we drove through the city, our guide <b>pointed out</b> all the sights.");
                    writeTagsCheckbox("I didn't realise I'd made a mistake until somebody <b>pointed</b> it <b>out to</b> me.");

                    writeParagraph("<b>run out</b> (<b>of</b> something)");
                    writeTagsCheckbox("We <b>ran out of</b> petrol on the motorway. (= we used all our petrol)");

                    writeParagraph("<b>sort</b> something <b>out</b> = <i>find a solution to, put in order</i>");
                    writeTagsCheckbox("There are a few problems we need to <b>sort out</b>.");
                    writeTagsCheckbox("All these papers are mixed up. I'll have to <b>sort</b> them </b>out</b>.");

                    writeParagraph("<b>turn out</b> to be ...&nbsp;, <b>turn out</b> good/nice etc., <b>turn out</b> that ...");
                    writeTagsCheckbox("Nobody believed Paul at first, but he <b>turned out</b> to be right. (= it became clear in the end that he was right)");
                    writeTagsCheckbox("The weather wasn’t so good in the morning, but it <b>turned out</b> nice later.");
                    writeTagsCheckbox("I thought they knew each other, but it <b>turned out</b> that they’d never met.");

                    writeParagraph("<b>try out</b> a machine, a system, a new idea etc. = <i>test it to see if it is OK</i>");
                    writeTagsCheckbox("The company is <b>trying out</b> a new computer system at the moment.");
                </script>  
            </div>
