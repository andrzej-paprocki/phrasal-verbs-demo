        <div class="podheader">
            <p class="class12" id="x">Unit 142 theory &nbsp; &nbsp; Phrasal verbs 6  &nbsp; &nbsp; <b>up</b> / <b>down</b> </p>
        </div>

        <!-- теги для хедера -->
        <script type="text/javascript" src="js/header_theory.js"></script>      

        <!-- подключение функций для навигации (теория/упражнения, предыдущий/следующий...) -->

        <!-- Если открыт файл теории, то слово "theory" должно быть жирным. 
            Если открыт файл упражнений – то жирным должно быть слово "exercises" -->
            <script src="js/theoryorexercises.js"></script>


            <br/><br/><br/>

            <div class="container">    

                <script> writeParagraph("Compare <b>up</b> and <b>down</b>:"); </script> 
                <!--section A    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>put </b>something <b>up </b>(on a wall etc.)");
                        writeTagsCheckbox("I <b>put </b>a picture <b>up </b>on the wall.", "Я <b>повесил</b> картину на стену."); 

                        writeParagraph("<b>take </b>something <b>down </b>(from a wall etc.)");
                        writeTagsCheckbox("I didn’t like the picture, so I <b>took </b>it <b>down</b>.");
                    </script>

                    <hr>

                    <script>
                        writeParagraph("<b>pick </b>something <b>up</b>");
                        writeTagsCheckbox("There was a letter on the floor. I <b>picked </b>it <b>up </b>and looked at it.", "На полу было письмо. Я <b>поднял</b> его и взглянул на него."); 

                        writeParagraph("<b>put </b>something <b>down</b>");
                        writeTagsCheckbox("I stopped writing and <b>put down</b> my pen.");
                    </script>

                    <hr>

                    <script>
                        writeParagraph("<b>stand up</b>");
                        writeTagsCheckbox("Alan <b>stood up </b>and walked out.", "Алан <b>встал</b> и вышел.");

                        writeParagraph("<b>sit down </b>/ <b>bend down </b>/ <b>lie down</b>");
                        writeTagsCheckbox("I <b>bent down </b>to tie my shoelace.");
                    </script>

                    <hr>

                    <script>
                        writeParagraph(" <b>turn </b>something <b>up</b>");
                        writeTagsCheckbox("I can’t hear the TV. Can you <b>turn </b>it <b>up </b>a bit?");

                        writeParagraph("<b>turn </b>something <b>down</b>");
                        writeTagsCheckbox("The oven is too hot. <b>Turn </b>it <b>down </b>to 150 degrees.");
                    </script> 
                </div>

                <script> writeParagraph("<b>Knock down</b>, <b>cut down </b>etc."); </script>
                <!--section B    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>knock down </b>a building, <b>blow </b>something <b>down</b>, <b>cut </b>something <b>down </b>etc."); 
                        writeTagsCheckbox("Some old houses were <b>knocked down </b>to make way for the new shopping centre."); 
                        writeTagsCheckbox("Why did you <b>cut down </b>the tree in your garden?"); 

                        writeParagraph("be <b>knocked down </b>(by a car etc.)");
                        writeTagsCheckbox("A man was <b>knocked down </b>by a car and taken to hospital."); 

                        writeParagraph("<b>burn down </b>= <i>be destroyed by fire</i>");
                        writeTagsCheckbox("They were able to put out the fire before the house <b>burnt down</b>."); 
                    </script> 
                </div>

                <script> writeParagraph("<b>Down </b>= getting less"); </script>
                <!--section C    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>slow down </b>= <i>go more slowly</i>");
                        writeTagsCheckbox("You’re driving too fast. <b>Slow down</b>."); 

                        writeParagraph("<b>calm </b>(somebody) <b>down </b>= <i>become calmer, make somebody calmer</i>");
                        writeTagsCheckbox("<b>Calm down</b>. There’s no point in getting angry."); 

                        writeParagraph("<b>cut down </b>(<b>on </b>something) = <i>eat, drink or do something less often</i>");
                        writeTagsCheckbox("I’m trying to <b>cut down on </b>coffee, I drink too much of it."); 
                    </script> 
                </div>

                <script> writeParagraph("Other verbs + <b>down</b>"); </script>
                <!--section D    -->
                <div class="section">
                    <script>
                        writeParagraph("<b>break down </b>= <i>stop working (for machines, cars, relationships etc.)</i>");
                        writeTagsCheckbox("The car <b>broke down </b>and I had to phone for help."); 
                        writeTagsCheckbox("Their marriage <b>broke down </b>after only a few months.");

                        writeParagraph("<b>close down </b>/ <b>shut down </b>= <i>stop doing business</i>");
                        writeTagsCheckbox("There used to be a shop at the end of the street; it <b>closed down </b>a few years ago."); 

                        writeParagraph("<b>let </b>somebody <b>down </b>= <i>disappoint them because you didn’t do what they hoped</i>");
                        writeTagsCheckbox("You can always rely on Paul. He’ll never <b>let </b>you <b>down</b>."); 

                        writeParagraph("<b>turn </b>somebody/something <b>down </b>= <i>refuse an application, an offer etc.</i>");
                        writeTagsCheckbox("I applied for several jobs, but I was <b>turned down </b>for all of them."); 
                        writeTagsCheckbox("Rachel was offered the job, but she decided to <b>turn </b>it <b>down</b>.");

                        writeParagraph("<b>write </b>something <b>down </b>= <i>write something on paper because you may need the information later</i>");
                        writeTagsCheckbox("I can’t remember Tim’s address. I <b>wrote </b>it <b>down</b>, but I can’t find it.");
                    </script> 
                </div>
