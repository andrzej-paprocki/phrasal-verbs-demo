<body>
	<div class="wrapper">
		<div class="podheader">
			<p class="class12" id="x">Unit 138 theory &nbsp; &nbsp; Phrasal verbs 2 &nbsp; &nbsp; <b>in</b>/<b>out</b></p>
		</div>

		<!-- теги для хедера -->
		<script type="text/javascript" src="js/header_theory.js"></script>      

		<!-- подключение функций для навигации (теория/упражнения, предыдущий/следующий...) -->
		<script type="text/javascript" src="js/navigation_theory.js"></script>

        <!-- Если открыт файл теории, то слово "theory" должно быть жирным. 
        	Если открыт файл упражнений – то жирным должно быть слово "exercises" -->
        	<script src="js/theoryorexercises.js"></script>

        	<br/><br/><br/>


        	<div class="container">    
        		<!--section A    -->
        		<p>Compare <b>in</b> and <b>out</b>:</p>
        		<div class="section">
        			<script>
        				writeParagraph("<b>in</b> = into a room, a building, a car etc.");
        				writeTagsCheckbox("How did the thieves <b>get in</b>?");
        				writeTagsCheckbox("Here's a key so you can <b>let yourself in</b>.");
        				writeTagsCheckbox("Lisa walked up to the edge of the pool and <b>dived in</b>. (= into the water)");
        				writeTagsCheckbox("I've got a new apartment. I'm <b>moving in</b> on Friday.");
        				writeTagsCheckbox("As soon as I got to the airport, I <b>checked in</b>.");
        				writeParagraph("In the same way you can say <b>go in</b>, <b>come in</b>, <b>walk in</b>, <b>break in</b> etc.");
        				writeParagraph("Compare <b>in</b> and <b>into</b>:");
        				writeTagsCheckbox("I'm moving <b>in</b> next week.");
        				writeTagsCheckbox("I'm moving <b>into my new flat</b> on Friday.");

        				document.write("<hr/>");

        				writeParagraph("<b>out</b> = out of a room, building, a car etc.");
        				writeTagsCheckbox("He just stood up and <b>walked out</b>.");
        				writeTagsCheckbox("I had no key, so I was <b>locked out</b>.");
        				writeTagsCheckbox("She swam up and down the pool, and then <b>climbed out</b>.");
        				writeTagsCheckbox("Andy opened the window and looked out.");
        				writeTagsCheckbox("<i>(at a hotel)</i> What time do we have to <b>check out?</b>");
        				writeParagraph("In the same way you can say <b>go out</b>, <b>get out</b>, <b>move out</b>, <b>let</b> somebody <b>out</b> etc.");
        				writeParagraph("Compare <b>out</b> and <b>out of</b>:");
        				writeTagsCheckbox("He walked <b>out</b>.");
        				writeTagsCheckbox("He walked <b>out of the room</b>.");
        			</script>
        		</div>

        		<!--section B    -->
        		<p>Other verbs + <b>in</b></p>
        		<div class="section">
        			<script>
        				writeParagraph("<b>drop in</b> = <i>visit somebody for a short time without arranging to do this</i>");
        				writeTagsCheckbox("<b>I dropped in</b> to see Chris on my way home.");
        				writeParagraph("<b>join in</b> = <i>take part in an activity that is already going on</i>");
        				writeTagsCheckbox("They were playing cards, so I <b>joined in</b>.");
        				writeParagraph("<b>plug in an</b> electrical machine = <i>connect it to the electricity supply</i>");
        				writeTagsCheckbox("The fridge isn't working because you haven’t <b>plugged</b> it <b>in</b>.");
        				writeParagraph("<b>fill in</b> a form, a questionnaire etc. = <i>write the necessary information on a form</i>");
        				writeTagsCheckbox("Please <b>fill in</b> the application form and send it to us by 28 February.");
        				writeParagraph("You can also say <b>fill out</b> a form.");
        				writeParagraph("<b>take</b> somebody <b>in</b> = <i>deceive somebody</i>");
        				writeTagsCheckbox("The man said he was a policeman and I believed him. I was completely <b>taken in</b>.");
        			</script> 
        		</div>

        		<!--section C    -->
        		<p>Other verbs + <b>out</b></p>
        		<div class="section">
        			<script>
        				writeParagraph("<b>eat out</b> = <i>eat at a restaurant, not at home</i>");
        				writeTagsCheckbox("There wasn't anything to eat at home, so we decided to <b>eat out</b>.");
        				writeParagraph("<b>drop out</b> of college, university, a course, a race = <i>stop before you have completely finished a course/race etc.</i>");
        				writeTagsCheckbox("Gary went to university but <b>dropped out</b> after a year.");
        				writeParagraph("<b>get out</b> of something that you arranged to do = <i>avoid doing it</i>");
						writeTagsCheckbox("I promised I'd go to the wedding. I don't want to go, but I can't <b>get out</b> of it now.");
        				writeParagraph("<b>cut</b> something <b>out</b> (of a newspaper etc.)");
        				writeTagsCheckbox("There was a beautiful picture in the magazine, so I <b>cut</b> it <b>out</b> and kept it.");
        				writeParagraph("<b>leave</b> something <b>out</b> = <i>omit it, not include it</i>");
        				writeTagsCheckbox("In the sentence 'She said that she was ill', you can <b>leave out</b> the word 'that'.");
        				writeParagraph("<b>cross</b> something <b>out</b> / <b>rub</b> something <b>out</b>");
        				writeTagsCheckbox("Some of the names on the list had been <b>crossed out</b>.");
        			</script>
        		</div>
